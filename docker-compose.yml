version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${DOCKER_HOST_PORT}:${APP_PORT}
    volumes:
      - ./:/yoku/api
    env_file: 
      - ./.env
    depends_on:
      - postgres
    networks:
      - yoku
    restart: always

  postgres:
    image: postgres:15.1
    ports:
      - ${DOCKER_DB_PORT}:${POSTGRES_PORT}
    env_file: 
      - ./.env
    volumes:
      - /yoku/postgres:/var/lib/postgresql/data
    networks:
      - yoku
    restart: always

networks:
  yoku:
